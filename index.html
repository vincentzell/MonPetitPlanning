<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Extracteur de Planning</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; line-height: 1.6; }
        .card { border: 1px solid #ccc; padding: 20px; border-radius: 8px; background: #f9f9f9; }
        input, button { padding: 10px; margin: 10px 0; width: 100%; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #eee; }
        @media print { .no-print { display: none; } body { margin: 0; } }
    </style>
</head>
<body>

<div class="card no-print">
    <h2>📅 Extracteur de Planning Ambulancier</h2>
    <p>Sélectionnez votre fichier Excel 2026 pour isoler vos gardes.</p>
    
    <label>Votre Nom (exactement comme dans l'Excel) :</label>
    <input type="text" id="userName" placeholder="Ex: RENAUDET Pascal" value="RENAUDET Pascal">
    
    <label>Fichier Planning (.xlsx) :</label>
    <input type="file" id="fileInput" accept=".xlsx">
    
    <button onclick="traiterFichier()">Générer mon planning imprimable</button>
</div>

<div id="output"></div>

<script>
function traiterFichier() {
    const file = document.getElementById('fileInput').files[0];
    const nomCible = document.getElementById('userName').value.trim().toLowerCase();
    if(!file) return alert("Sélectionnez un fichier !");

    const reader = new FileReader();
    reader.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, {type: 'array'});
        let resultats = "<h2>Mon Planning : " + nomCible.toUpperCase() + "</h2><table><tr><th>Date</th><th>Poste</th></tr>";

        workbook.SheetNames.forEach(sheetName => {
            // On ignore les feuilles de réglages
            if(["infos", "vacances", "congés d'été"].includes(sheetName.toLowerCase())) return;

            const sheet = workbook.Sheets[sheetName];
            const json = XLSX.utils.sheet_to_json(sheet, {header: 1});

            // On cherche la ligne de l'utilisateur
            json.forEach((row, index) => {
                if(row[0] && row[0].toString().toLowerCase().includes(nomCible)) {
                    // Les dates sont généralement sur la ligne 3 (index 2)
                    const datesRow = json[2]; 
                    row.forEach((cell, colIndex) => {
                        // On prend les colonnes après la colonne 8 (début des jours)
                        if(colIndex >= 8 && cell && cell.toString().trim() !== "") {
                            let dateLabel = datesRow[colIndex] || "Date inconnue";
                            resultats += `<tr><td>${sheetName} - ${dateLabel}</td><td><b>${cell}</b></td></tr>`;
                        }
                    });
                }
            });
        });

        resultats += "</table><br><button class='no-print' onclick='window.print()'>🖨️ Imprimer mon planning</button>";
        document.getElementById('output').innerHTML = resultats;
    };
    reader.readAsArrayBuffer(file);
}
</script>
</body>
</html>
