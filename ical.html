<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Générateur iCal</title>
    <script src="xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; line-height: 1.6; }
        #drop-zone { border: 2px dashed #ccc; padding: 20px; text-align: center; cursor: pointer; margin-bottom: 20px; }
        #drop-zone.hover { border-color: #333; background-color: #f9f9f9; }
        #output { white-space: pre-wrap; background: #eee; padding: 10px; border: 1px solid #ddd; max-height: 300px; overflow-y: auto; }
        .controls { margin-top: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Générateur de Calendrier</h1>
    <div id="drop-zone">Déposez votre fichier Excel ici ou cliquez pour choisir</div>
    <input type="file" id="file-input" style="display:none" accept=".xlsx, .xls">

    <div class="controls">
        <label for="agent-select">Choisir un agent :</label>
        <select id="agent-select"></select>
        <button id="save-btn" disabled>Sauvegarder et Générer le lien</button>
    </div>

    <h3>Aperçu des données :</h3>
    <div id="output">Aucune donnée chargée.</div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const agentSelect = document.getElementById('agent-select');
        const saveBtn = document.getElementById('save-btn');
        const output = document.getElementById('output');

        let workbookData = null;

        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('hover'); };
        dropZone.ondragleave = () => dropZone.classList.remove('hover');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('hover');
            handleFile(e.dataTransfer.files[0]);
        };
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                workbookData = XLSX.utils.sheet_to_json(worksheet);
                
                populateAgents(workbookData);
                output.textContent = JSON.stringify(workbookData, null, 2);
                saveBtn.disabled = false;
            };
            reader.readAsArrayBuffer(file);
        }

        function populateAgents(data) {
            agentSelect.innerHTML = "";
            if (data.length > 0) {
                // On suppose que la première colonne contient les noms (à adapter selon ton Excel)
                const keys = Object.keys(data[0]);
                const agentKey = keys[0]; 
                const agents = [...new Set(data.map(row => row[agentKey]))].filter(a => a);
                agents.forEach(agent => {
                    const opt = document.createElement('option');
                    opt.value = agent.toLowerCase().replace(/\s+/g, '');
                    opt.textContent = agent;
                    agentSelect.appendChild(opt);
                });
            }
        }

        saveBtn.onclick = async () => {
            const agent = agentSelect.value;
            const keys = Object.keys(workbookData[0]);
            const agentKey = keys[0];
            
            // Formatage des données en "Date|Poste" pour le worker
            const filteredData = workbookData
                .filter(row => row[agentKey].toLowerCase().replace(/\s+/g, '') === agent)
                .map(row => {
                    // Logique simplifiée : adapter selon les colonnes réelles de ton Excel
                    const dateRaw = row["Date"] || row[keys[1]]; 
                    const poste = row["Poste"] || row[keys[2]];
                    return `${dateRaw}|${poste}`;
                }).join('\n');

            await saveToCloudflare(agent, filteredData);
        };

        async function saveToCloudflare(agent, data) {
            const workerUrl = "https://monpetitplanning-ical.vincentzell.workers.dev/store";
            
            try {
                const response = await fetch(workerUrl, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json" // Spécifie le format JSON
                    },
                    body: JSON.stringify({
                        agent: agent,
                        data: data
                    })
                });

                if (response.ok) {
                    const icalUrl = `https://monpetitplanning-ical.vincentzell.workers.dev/?agent=${agent}`;
                    alert("Succès ! Votre lien iCal est prêt :\n" + icalUrl);
                    console.log("Lien :", icalUrl);
                } else {
                    const err = await response.text();
                    alert("Erreur lors de la sauvegarde : " + err);
                }
            } catch (error) {
                alert("Erreur réseau : " + error.message);
            }
        }
    </script>
</body>
</html>
