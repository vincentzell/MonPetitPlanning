<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import Planning</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 16px; background: #f4f7f6; }
        .box { background: white; border-radius: 12px; padding: 24px; max-width: 420px; margin: 0 auto; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }

        .progress-bar { background: #e9ecef; border-radius: 99px; height: 6px; margin-bottom: 20px; }
        .progress-fill { background: #1a73e8; border-radius: 99px; height: 6px; transition: width 0.3s; }

        .step-label { font-size: 0.78em; color: #888; margin-bottom: 4px; }
        .event-date { font-size: 0.9em; color: #555; margin-bottom: 4px; }
        .event-poste { font-size: 1.6em; font-weight: bold; color: #1a1a1a; margin-bottom: 20px; }

        .btn-add { display: block; width: 100%; background: #1a73e8; color: white; border: none; border-radius: 10px; padding: 16px; font-size: 1em; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; margin-bottom: 10px; }
        .btn-skip { display: block; width: 100%; background: none; color: #888; border: none; font-size: 0.85em; cursor: pointer; padding: 8px; }

        .done-box { text-align: center; padding: 12px 0; }
        .done-icon { font-size: 3em; margin-bottom: 12px; }
        .done-title { font-size: 1.1em; font-weight: bold; margin-bottom: 6px; }
        .done-sub { font-size: 0.85em; color: #666; }

        .err { color: #dc3545; font-size: 0.9em; text-align: center; padding: 20px 0; }
    </style>
</head>
<body>
<div class="box">
    <div id="app"></div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const app = document.getElementById('app');

    const JOURS = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
    const MOIS = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

    const pad = n => String(n).padStart(2, '0');

    const parseYMD = ymd => ({ y: +ymd.slice(0,4), m: +ymd.slice(4,6), d: +ymd.slice(6,8) });

    const formatDate = ymd => {
        const { y, m, d } = parseYMD(ymd);
        const dt = new Date(y, m - 1, d);
        return JOURS[dt.getDay()] + ' ' + d + ' ' + MOIS[m - 1] + ' ' + y;
    };

    const nextDayYMD = ymd => {
        const { y, m, d } = parseYMD(ymd);
        const dt = new Date(Date.UTC(y, m - 1, d + 1));
        return dt.getUTCFullYear() + pad(dt.getUTCMonth()+1) + pad(dt.getUTCDate());
    };

    const gcalUrl = (ds, poste) =>
        'https://calendar.google.com/calendar/render?action=TEMPLATE' +
        '&text=' + encodeURIComponent(poste) +
        '&dates=' + ds + '%2F' + nextDayYMD(ds) +
        '&sf=true&output=xml';

    function renderStep(events, idx) {
        if (idx >= events.length) {
            app.innerHTML = `
                <div class="done-box">
                    <div class="done-icon">✅</div>
                    <div class="done-title">Planning importé !</div>
                    <div class="done-sub">${events.length} jour${events.length > 1 ? 's' : ''} ajouté${events.length > 1 ? 's' : ''} à votre agenda.</div>
                </div>`;
            return;
        }

        const ev = events[idx];
        const { ds, poste } = ev;
        const pct = Math.round((idx / events.length) * 100);

        app.innerHTML = `
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
            <div class="step-label">${idx + 1} sur ${events.length}</div>
            <div class="event-date">${formatDate(ds)}</div>
            <div class="event-poste">${poste}</div>
            <a class="btn-add" href="${gcalUrl(ds, poste)}" target="_blank" id="btnAdd">
                ➕ Ajouter à Google Agenda
            </a>
            <button class="btn-skip" id="btnNext">Suivant →</button>`;

        document.getElementById('btnAdd').addEventListener('click', () => {
            setTimeout(() => renderStep(events, idx + 1), 800);
        });
        document.getElementById('btnNext').addEventListener('click', () => {
            renderStep(events, idx + 1);
        });
    }

    async function init() {
        if (!id) {
            app.innerHTML = '<p class="err">Lien invalide. Scannez à nouveau le QR code.</p>';
            return;
        }

        app.innerHTML = '<p style="text-align:center; color:#888; padding:20px 0;">Chargement…</p>';

        try {
            const resp = await fetch('https://monpetitplanning-ical.vincentzell.workers.dev/get?id=' + id);
            if (resp.status === 404) {
                app.innerHTML = '<p class="err">Ce QR code a expiré (valable 24h).<br>Régénérez-en un nouveau depuis l\'ordinateur.</p>';
                return;
            }
            if (!resp.ok) throw new Error();

            // Lire le .ics et en extraire les événements
            const ics = await resp.text();
            const events = [];
            const veventBlocks = ics.split('BEGIN:VEVENT').slice(1);
            veventBlocks.forEach(block => {
                const dsMatch = block.match(/DTSTART[^:]*:(\d{8})/);
                const summaryMatch = block.match(/SUMMARY:(.+)/);
                if (dsMatch && summaryMatch) {
                    events.push({ ds: dsMatch[1], poste: summaryMatch[1].trim() });
                }
            });

            if (events.length === 0) {
                app.innerHTML = '<p class="err">Aucun événement trouvé dans ce planning.</p>';
                return;
            }

            renderStep(events, 0);

        } catch(e) {
            app.innerHTML = '<p class="err">Erreur de connexion. Vérifiez votre accès internet et réessayez.</p>';
        }
    }

    init();
</script>
</body>
</html>
