<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import Planning</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 16px; background: #f4f7f6; }
        .box { background: white; border-radius: 12px; padding: 24px; max-width: 420px; margin: 0 auto; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
        h2 { margin: 0 0 6px; font-size: 1.1em; }
        .subtitle { color: #666; font-size: 0.85em; margin: 0 0 20px; line-height: 1.5; }
        .btn-gcal { display: block; background: #1a73e8; color: white; border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; text-decoration: none; font-size: 0.9em; font-weight: 500; }
        .btn-gcal:hover { background: #1557b0; }
        .date-label { font-size: 0.75em; opacity: 0.8; display: block; }
        .poste-label { font-size: 1em; font-weight: bold; }
        .err { color: #dc3545; font-size: 0.9em; }
        .btn-ics { display: block; background: #6c757d; color: white; border-radius: 8px; padding: 10px 16px; margin-top: 16px; text-align: center; text-decoration: none; font-size: 0.85em; }
    </style>
</head>
<body>
    <div class="box">
        <h2>📅 Import Planning</h2>
        <p class="subtitle" id="subtitle">Chargement…</p>
        <div id="content"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const e = params.get('e');

        if (!e) {
            document.getElementById('subtitle').innerHTML = '<span class="err">Lien invalide. Scannez à nouveau le QR code.</span>';
        } else {
            const events = e.split(',').filter(Boolean);
            const pad = n => String(n).padStart(2, '0');

            const parseYMD = ymd => ({ y: ymd.slice(0,4), m: ymd.slice(4,6), d: ymd.slice(6,8) });

            const nextDayYMD = ymd => {
                const { y, m, d } = parseYMD(ymd);
                const dt = new Date(Date.UTC(+y, +m - 1, +d + 1));
                return dt.getUTCFullYear() + pad(dt.getUTCMonth()+1) + pad(dt.getUTCDate());
            };

            const JOURS = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
            const MOIS = ['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];

            const formatDate = ymd => {
                const { y, m, d } = parseYMD(ymd);
                const dt = new Date(+y, +m - 1, +d);
                return JOURS[dt.getDay()] + ' ' + +d + ' ' + MOIS[+m - 1] + ' ' + y;
            };

            const content = document.getElementById('content');

            events.forEach(ev => {
                const sep = ev.indexOf('|');
                if (sep === -1) return;
                const ds = ev.slice(0, sep);
                const poste = ev.slice(sep + 1);
                const de = nextDayYMD(ds);

                const gcalUrl = 'https://calendar.google.com/calendar/render?action=TEMPLATE' +
                    '&text=' + encodeURIComponent(poste) +
                    '&dates=' + ds + '%2F' + de +
                    '&sf=true&output=xml';

                const a = document.createElement('a');
                a.href = gcalUrl;
                a.className = 'btn-gcal';
                a.target = '_blank';
                a.innerHTML = '<span class="date-label">' + formatDate(ds) + '</span><span class="poste-label">' + poste + '</span>';
                content.appendChild(a);
            });

            const icsBtn = document.createElement('a');
            icsBtn.href = 'https://monpetitplanning-ical.vincentzell.workers.dev/?e=' + encodeURIComponent(e);
            icsBtn.className = 'btn-ics';
            icsBtn.textContent = 'Télécharger le fichier .ics (autres agendas)';
            content.appendChild(icsBtn);

            const n = events.length;
            document.getElementById('subtitle').textContent =
                n + ' jour' + (n > 1 ? 's' : '') + ' à importer — appuyez sur chaque poste pour l\'ajouter à Google Agenda.';
        }
    </script>
</body>
</html>
