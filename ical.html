<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Générateur iCal - MonPetitPlanning</title>
    <script src="xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 40px; color: #333; }
        #drop-zone { border: 3px dashed #3498db; border-radius: 10px; padding: 40px; text-align: center; cursor: pointer; transition: 0.3s; }
        #drop-zone.hover { background: #ebf5fb; border-color: #2980b9; }
        .controls { margin: 20px 0; display: flex; gap: 10px; align-items: center; }
        button { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        button:disabled { background: #bdc3c7; }
        #output { background: #f8f9fa; border: 1px solid #ddd; padding: 15px; border-radius: 5px; max-height: 200px; overflow-y: auto; font-size: 0.9em; }
    </style>
</head>
<body>

    <h1>📅 Générateur de Planning iCal</h1>
    <div id="drop-zone">Glissez-déposez le fichier Excel ici ou cliquez pour parcourir</div>
    <input type="file" id="file-input" style="display:none" accept=".xlsx, .xls">

    <div class="controls">
        <label>Agent :</label>
        <select id="agent-select"></select>
        <button id="save-btn" disabled>Générer et Sauvegarder</button>
    </div>

    <div id="output">En attente de fichier...</div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const agentSelect = document.getElementById('agent-select');
        const saveBtn = document.getElementById('save-btn');
        const output = document.getElementById('output');

        let fullData = [];

        // --- Gestion des fichiers ---
        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('hover'); };
        dropZone.ondragleave = () => dropZone.classList.remove('hover');
        dropZone.ondrop = (e) => { e.preventDefault(); dropZone.classList.remove('hover'); handleFile(e.dataTransfer.files[0]); };
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                fullData = XLSX.utils.sheet_to_json(sheet);
                
                if (fullData.length > 0) {
                    populateAgents(fullData);
                    output.innerHTML = `✅ <b>${fullData.length}</b> lignes chargées. Sélectionnez un agent.`;
                    saveBtn.disabled = false;
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function populateAgents(data) {
            const agentKey = Object.keys(data[0])[0]; 
            const agents = [...new Set(data.map(row => row[agentKey]))].filter(a => a).sort();
            agentSelect.innerHTML = agents.map(a => `<option value="${a}">${a}</option>`).join('');
        }

        // --- Sauvegarde ---
        saveBtn.onclick = async () => {
            const selectedAgent = agentSelect.value;
            const agentSlug = selectedAgent.toLowerCase().replace(/\s+/g, '');
            const keys = Object.keys(fullData[0]);
            const agentKey = keys[0];
            const dateKey = keys[1]; // Supposé être la 2ème colonne
            const posteKey = keys[2]; // Supposé être la 3ème colonne

            // Filtrage et formatage Date|Poste
            const formattedLines = fullData
                .filter(row => row[agentKey] === selectedAgent)
                .map(row => {
                    let d = row[dateKey];
                    // Si Excel transforme la date en nombre, on peut avoir besoin de la convertir
                    // Ici on assume un format texte YYYYMMDD ou compatible
                    return `${d}|${row[posteKey] || 'Poste'}`;
                }).join('\n');

            await sendToWorker(agentSlug, formattedLines);
        };

        async function sendToWorker(slug, planningText) {
            const url = "https://monpetitplanning-ical.vincentzell.workers.dev/store";
            
            try {
                saveBtn.innerText = "Envoi...";
                saveBtn.disabled = true;

                const response = await fetch(url, {
                    method: "POST",
                    mode: "cors", // Force le mode CORS
                    headers: {
                        "Content-Type": "application/json" // CRUCIAL
                    },
                    body: JSON.stringify({
                        agent: slug,
                        data: planningText
                    })
                });

                if (response.ok) {
                    const finalUrl = `https://monpetitplanning-ical.vincentzell.workers.dev/?agent=${slug}`;
                    output.innerHTML = `🎉 <b>Sauvegarde réussie !</b><br><br>Lien à copier dans Google Agenda :<br><code style="background:#fff; padding:5px; border:1px solid #ccc;">${finalUrl}</code>`;
                    alert("C'est bon ! Le lien est généré.");
                } else {
                    const errorMsg = await response.text();
                    throw new Error(errorMsg || "Erreur 400 du Worker");
                }
            } catch (err) {
                alert("Erreur : " + err.message);
                output.textContent = "Erreur : " + err.message;
            } finally {
                saveBtn.innerText = "Générer et Sauvegarder";
                saveBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
